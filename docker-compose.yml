services:

  postgres:
    image: postgres:15-alpine
    container_name: quantflow-postgres
    environment:
      POSTGRES_USER:     quantflow
      POSTGRES_PASSWORD: quantflow
      POSTGRES_DB:       quantflow
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quantflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantflow"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: quantflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    networks:
      - quantflow-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: quantflow-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_LISTENERS:                        INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS:             INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
    networks:
      - quantflow-network
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  matching-engine:
    build:
      context:    ./services/matching-engine
      dockerfile: Dockerfile
    container_name: quantflow-matching-engine
    ports:
      - "50051:50051"
    networks:
      - quantflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  order-service:
    build:
      context:    ./services/order-service
      dockerfile: Dockerfile
    container_name: quantflow-order-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL:            postgresql://quantflow:quantflow@postgres:5432/quantflow
      MATCHING_ENGINE_URL:     matching-engine:50051
      JWT_SECRET:              supersecretkey_change_in_production
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      matching-engine:
        condition: service_healthy
    networks:
      - quantflow-network
    restart: unless-stopped

  portfolio-service:
    build:
      context:    ./services/portfolio-service
      dockerfile: Dockerfile
    container_name: quantflow-portfolio-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL:            postgresql://quantflow:quantflow@postgres:5432/quantflow
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - quantflow-network
    restart: unless-stopped

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: quantflow-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL:       http://localhost:8001
      NEXT_PUBLIC_PORTFOLIO_URL: http://localhost:8002
      NEXT_PUBLIC_WS_URL:        ws://localhost:8001
    depends_on:
      - order-service
      - portfolio-service
    networks:
      - quantflow-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  quantflow-network:
    driver: bridge