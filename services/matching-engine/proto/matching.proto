syntax = "proto3";

package matching;

option go_package = "quantflow/matching-engine/proto";

message SubmitOrderRequest {
  string order_id = 1;
  string user_id  = 2;
  string symbol   = 3;
  string side     = 4;
  string type     = 5;
  double price    = 6;
  int64  quantity = 7;
}

message TradeResult {
  string trade_id     = 1;
  string symbol       = 2;
  string buy_order_id  = 3;
  string sell_order_id = 4;
  string buyer_id     = 5;
  string seller_id    = 6;
  double price        = 7;
  int64  quantity     = 8;
  string executed_at  = 9;
}

message SubmitOrderResponse {
  string order_id  = 1;
  string status    = 2;
  int64  filled    = 3;
  int64  remaining = 4;
  repeated TradeResult trades = 5;
}

message CancelOrderRequest {
  string order_id = 1;
  string symbol   = 2;
}

message CancelOrderResponse {
  bool   success = 1;
  string message = 2;
}

message OrderBookRequest {
  string symbol = 1;
}

message PriceLevel {
  double price    = 1;
  int64  quantity = 2;
}

message OrderBookResponse {
  string symbol = 1;
  repeated PriceLevel bids = 2;
  repeated PriceLevel asks = 3;
}

service MatchingService {
  rpc SubmitOrder  (SubmitOrderRequest)  returns (SubmitOrderResponse);
  rpc CancelOrder  (CancelOrderRequest)  returns (CancelOrderResponse);
  rpc GetOrderBook (OrderBookRequest)    returns (OrderBookResponse);
}